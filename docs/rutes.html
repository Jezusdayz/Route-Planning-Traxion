<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TraxIA - Routes</title>
    
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    
    <link rel="stylesheet" href="css/rutes.css">
</head>

<body id="distribucion-principal">
    <div id="navbar"></div>

    <main class="container">
        <section class="flex-wrapper">
            <article class="contenedor">
                <h2>Asistente Tracy</h2>
                <div id="agent-wrapper" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
                    
                    <div id="setup-form">
                        <p style="font-size: 11px; color: #666; margin-bottom: 8px;">Configura los parámetros de la ruta:</p>
                        <div class="form-group" style="display: flex; flex-direction: column; gap: 5px;">
                            <input type="text" id="route-origin" placeholder="Origen" style="padding: 8px; font-size: 12px;">
                            <input type="text" id="route-dest" placeholder="Destino" style="padding: 8px; font-size: 12px;">
                            <select id="unit-type" style="padding: 8px; font-size: 12px;">
                                <option value="40">Unidad 40 Plazas</option>
                                <option value="20">Unidad 20 Plazas</option>
                            </select>
                        </div>
                        <button id="start-chat-btn" onclick="startAgent()" style="margin-top: 10px; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">Configurar Agente</button>
                    </div>

                    <div id="chat-container" style="display: none; flex: 1; flex-direction: column; background: white;">
                        <div id="chat-window" style="flex: 1; overflow-y: auto; padding: 10px;">
                            <div class="bot-msg">
                                <strong>Tracy:</strong> ¡Listo! Ruta configurada. ¿En qué puedo ayudarte?
                            </div>
                        </div>
                        <div class="chat-input-area" style="display: flex; border-top: 1px solid #eee; padding: 5px;">
                            <input type="text" id="user-input" placeholder="Escribe un mensaje..." style="flex: 1; border: none; padding: 8px;">
                            <button id="send-btn" onclick="sendMessage()" style="padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px;">Enviar</button>
                        </div>
                    </div>
                </div>
            </article>
            
            <article class="contenedor">
                <h2>Mapa de rutas</h2>
                <div id="mapa" class="mapa-interactivo"></div>
            </article>

            <article class="contenedor">
                <h2>Panel de Monitoreo</h2>
                <div id="monitoring-grid" style="display: flex; flex-direction: column; gap: 10px; width: 100%;">
                    <section class="monitoreo-card" style="background: white; padding: 8px; border-radius: 4px; border: 1px solid #ddd;">
                        <div class="diag-mini" style="font-size: 10px;">
                            <div style="margin-bottom: 5px;">
                                <div style="display: flex; justify-content: space-between;">
                                    <span>Gasolina:</span> <strong id="fuel-text">100%</strong>
                                </div>
                                <div style="width: 100%; height: 6px; background: #eee; border-radius: 3px;">
                                    <div id="fuel-bar" style="width: 100%; height: 100%; background: #28a745; transition: width 0.3s;"></div>
                                </div>
                            </div>
                            <div>
                                <div style="display: flex; justify-content: space-between;">
                                    <span>Distancia:</span> <strong><span id="dist-val">0.0</span>/14.2km</strong>
                                </div>
                                <div style="width: 100%; height: 6px; background: #eee; border-radius: 3px;">
                                    <div id="dist-bar" style="width: 0%; height: 100%; background: #007bff; transition: width 0.3s;"></div>
                                </div>
                            </div>
                        </div>
                    </section>
                    <section class="monitoreo-card" style="background: white; padding: 8px; border-radius: 4px; border: 1px solid #ddd;">
                        <ul style="list-style: none; padding: 0; margin: 0; font-size: 9px; color: #555;">
                            <li>• Vías Primarias</li>
                            <li>• Evitar Zonas Restringidas</li>
                            <li>• Maximizar Eficiencia</li>
                        </ul>
                    </section>
                </div>
            </article>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <p>&copy; 2026 Equipo Gamma</p>
        </div>
    </footer>

    <script src="js/script.js"></script> 
    <script src="js/navbar.js"></script>
</body>
</html>
